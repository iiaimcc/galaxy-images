name: Build Qiskit Jupyter Image

on:
  push:
    paths:
      - qiskit-jupyter/**
      - .github/workflows/build-qiskit-jupyter.yaml
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v5
      - uses: docker/setup-buildx-action@v3
      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.repository_owner }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - uses: docker/build-push-action@v6
        with:
          context: ./qiskit-jupyter
          file: ./qiskit-jupyter/Dockerfile
          push: true
          platforms: linux/amd64
          tags: ghcr.io/${{ github.repository_owner }}/galaxy-interactive-qiskit-jupyter:${{ github.sha }}
